<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="Disco shell icon grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#efefea"/>
      <stop offset="1" stop-color="#d7d9d2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset=".2" stop-color="#9fe0ff"/>
      <stop offset=".45" stop-color="#f8f1a4"/>
      <stop offset=".7" stop-color="#ee8178"/>
      <stop offset="1" stop-color="#49413b"/>
    </linearGradient>
    <pattern id="tiles" width="11" height="11" patternUnits="userSpaceOnUse">
      <path d="M0 0h11v11H0z" fill="none" stroke="#171f1c" stroke-opacity=".22" stroke-width="1"/>
    </pattern>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="4" flood-color="#171f1c" flood-opacity=".20"/>
    </filter>
  </defs>
  <rect width="160" height="160" rx="14" fill="url(#bg)"/>
  <g filter="url(#drop)">
    <rect x="25" y="24" width="48" height="48" rx="12" fill="#fcfcfb"/>
    <rect x="87" y="24" width="48" height="48" rx="12" fill="#fb6c35"/>
    <rect x="25" y="88" width="48" height="48" rx="12" fill="#654dff"/>
    <rect x="87" y="88" width="48" height="48" rx="12" fill="#f9f6ea"/>
  </g>
  <g>
    <circle cx="49" cy="48" r="21" fill="url(#shine)"/>
    <circle cx="111" cy="48" r="21" fill="url(#shine)"/>
    <circle cx="49" cy="112" r="21" fill="url(#shine)"/>
    <circle cx="111" cy="112" r="21" fill="url(#shine)"/>
    <circle cx="49" cy="48" r="21" fill="url(#tiles)"/>
    <circle cx="111" cy="48" r="21" fill="url(#tiles)"/>
    <circle cx="49" cy="112" r="21" fill="url(#tiles)"/>
    <circle cx="111" cy="112" r="21" fill="url(#tiles)"/>
  </g>
  <path d="M39 43h22l-12 19z" fill="#171f1c" opacity=".82"/>
  <path d="M101 37h20l-10 21z" fill="#fff9e9" opacity=".9"/>
  <path d="M39 112h20" stroke="#fff9e9" stroke-width="7" stroke-linecap="round"/>
  <path d="M103 104h17v17h-17z" fill="#171f1c" opacity=".88"/>
</svg>
